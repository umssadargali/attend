<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqra Admin - Multi-Class</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; margin-bottom: 10px; }
        
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; font-weight: bold; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; gap: 8px; }
        .stat-box { text-align: center; background: #e8f5e9; padding: 10px; border-radius: 10px; flex: 1; border: 1px solid #c8e6c9; }
        .stat-box span { display: block; font-size: 20px; font-weight: bold; color: #2e7d32; }
        .stat-box label { font-size: 10px; color: #666; text-transform: uppercase; }

        .table-wrapper { overflow-x: auto; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #2e7d32; color: white; padding: 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .img-preview { 
            width: 45px; 
            height: 45px; 
            border-radius: 5px; 
            object-fit: cover; 
            background: #eee;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .status-in { color: #2e7d32; font-weight: bold; font-size: 11px; }
        .status-out { color: #d32f2f; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin Dashboard</h2>
    
    <select id="classPicker" onchange="loadAdminData()">
        <option value="">-- SELECT CLASS TO VIEW --</option>
        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
    </select>

    <div class="stats">
        <div class="stat-box"><span id="total">0</span><label>Total Records</label></div>
        <div class="stat-box"><span id="present" style="color:#2e7d32;">0</span><label>Status: IN</label></div>
    </div>

    <input type="text" id="search" placeholder="🔍 Search student name..." onkeyup="filterTable()">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Student Details</th>
                    <th>Status</th>
                    <th>Photo</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="3" style="text-align:center; padding:20px;">Select a class to load data.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // === YAHAN APNA NEW DEPLOYMENT URL DALEIN ===
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyLj_ovwm8GjUY9SN8LVMmnlzIpHayigOEqmPpQJvggrJKYQP47qBdjeB7e7R3cd6L/exec"; 

    async function loadAdminData() {
        let classId = document.getElementById('classPicker').value;
        if(!classId) return;

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Fetching from D" + classId + "...</td></tr>";

        try {
            // Admin ke liye hum poori sheet ka data mangwa rahe hain
            const response = await fetch(SCRIPT_URL + "?getAttendance=true&classId=" + classId + "&name=all");
            const data = await response.json();
            
            document.getElementById('total').innerText = data.length;
            let inCount = data.filter(r => r[5] === 'IN').length;
            document.getElementById('present').innerText = inCount;

            tbody.innerHTML = "";
            if(data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No records found in D" + classId + "</td></tr>";
                return;
            }

            data.forEach(row => {
                // Photo Fixer Logic
                let driveUrl = row[6] || "";
                let finalImg = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                
                if(driveUrl && driveUrl.includes("id=")) {
                    let id = driveUrl.split("id=")[1].split("&")[0];
                    finalImg = "https://drive.google.com/uc?export=view&id=" + id;
                }

                let statusClass = row[5] === 'IN' ? 'status-in' : 'status-out';
                let outTime = row[2] ? row[2] : "Inside";

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <b>${row[0]}</b><br>
                            <small>In: ${row[1]}</small>
                        </td>
                        <td>
                            <span class="${statusClass}">${row[5]}</span><br>
                            <small>${outTime}</small>
                        </td>
                        <td>
                            <img src="${finalImg}" class="img-preview" onclick="window.open('${driveUrl}')" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                        </td>
                    </tr>
                `;
            });
        } catch (e) {
            tbody.innerHTML = "<tr><td colspan='3' style='color:red; text-align:center;'>Connection Error!</td></tr>";
        }
    }

    function filterTable() {
        let input = document.getElementById("search").value.toUpperCase();
        let rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let nameCell = rows[i].getElementsByTagName("td")[0];
            if (nameCell) {
                let text = nameCell.textContent || nameCell.innerText;
                rows[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }
</script>
</body>
</html>
