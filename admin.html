<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqra Admin - Multi-Class</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; margin-bottom: 10px; }
        
        /* Fast Loading Styles */
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; font-weight: bold; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; gap: 8px; }
        .stat-box { text-align: center; background: #e8f5e9; padding: 10px; border-radius: 10px; flex: 1; border: 1px solid #c8e6c9; }
        .stat-box span { display: block; font-size: 20px; font-weight: bold; color: #2e7d32; }
        .stat-box label { font-size: 10px; color: #666; text-transform: uppercase; }

        .table-wrapper { overflow-x: auto; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #2e7d32; color: white; padding: 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        
        /* Low-Res Optimized Photo Styles */
        .img-preview { 
            width: 45px; 
            height: 45px; 
            border-radius: 5px; 
            object-fit: cover; 
            background: #eee;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .status-in { color: #2e7d32; font-weight: bold; font-size: 11px; }
        .status-out { color: #d32f2f; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin Dashboard</h2>
    
    <select id="classPicker" onchange="loadAdminData()">
        <option value="">-- SELECT CLASS TO VIEW --</option>
    </select>

    <div class="stats">
        <div class="stat-box"><span id="total">0</span><label>Today</label></div>
        <div class="stat-box"><span id="present" style="color:#2e7d32;">0</span><label>In</label></div>
        <div class="stat-box"><span id="away" style="color:#f44336;">0</span><label>Out</label></div>
    </div>

    <input type="text" id="search" placeholder="🔍 Search student..." onkeyup="filterTable()">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Status</th>
                    <th>Photo</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="3" style="text-align:center; padding:20px;">Select a class to load data.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwAyZNVWXJIGu4YsWMqQRBrY3VobKmnwYUbBuZhev4CaHVdtw3z3JwfZ-lxPhK-MFm/exec"; // <--- Apna Google Script URL yahan dalein

    // 1. Load Classes on startup
    fetch(SCRIPT_URL + "?getClasses=true").then(r => r.json()).then(classes => {
        let cp = document.getElementById('classPicker');
        classes.sort((a,b)=>a-b).forEach(c => cp.innerHTML += `<option value="${c}">Class ${c}</option>`);
    });

    // 2. Load Admin Data for specific Class
    async function loadAdminData() {
        let classId = document.getElementById('classPicker').value;
        if(!classId) return;

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Loading Fast...</td></tr>";

        try {
            // Humne Backend mein pehle hi logic likha hai jo D1, D2 se data layega
            const response = await fetch(SCRIPT_URL + "?admin=true&classId=" + classId);
            const data = await response.json();
            
            document.getElementById('total').innerText = data.total;
            document.getElementById('present').innerText = data.in;
            document.getElementById('away').innerText = data.out;

            tbody.innerHTML = "";
            if(data.list.length === 0) {
                tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No data for today.</td></tr>";
                return;
            }

            data.list.forEach(item => {
                let statusMsg = item.out === "Inside" 
                    ? `<span class="status-in">School Mein Hai</span>` 
                    : `<span class="status-out">Out: ${item.out}</span>`;

                tbody.innerHTML += `
                    <tr>
                        <td><b>${item.name}</b><br><small>In: ${item.in}</small></td>
                        <td>${statusMsg}</td>
                        <td>
                            ${item.pic && item.pic !== "No Photo" ? 
                            `<img src="${item.pic}" class="img-preview" loading="lazy" onclick="window.open('${item.pic}')">` : 
                            `<small>No Pic</small>`}
                        </td>
                    </tr>
                `;
            });
        } catch (e) {
            tbody.innerHTML = "<tr><td colspan='3' style='color:red; text-align:center;'>Error loading data!</td></tr>";
        }
    }

    function filterTable() {
        let input = document.getElementById("search").value.toUpperCase();
        let rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let nameCell = rows[i].getElementsByTagName("td")[0];
            if (nameCell) {
                let text = nameCell.textContent || nameCell.innerText;
                rows[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }
</script>
</body>
</html>
