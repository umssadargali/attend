<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQRA Fast Attendance</title>
    <style>
        body { font-family: sans-serif; background: #f0fdf4; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 360px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #2e7d32; }
        h2 { color: #2e7d32; margin: 5px 0; font-size: 20px; }
        #clock { font-size: 36px; font-weight: bold; color: #ff5722; margin: 5px 0; }
        select { width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 16px; font-weight: bold; border: 1px solid #2e7d32; }
        /* Camera Box Fix for Sketchware */
        .cam-box { width: 100%; border-radius: 10px; overflow: hidden; border: 2px solid #ccc; aspect-ratio: 4/3; margin-bottom: 10px; background: #000; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; margin-bottom: 8px; cursor: pointer; }
        .b-snap { background: #673ab7; } .b-in { background: #4CAF50; } .b-out { background: #f44336; }
        #status { font-weight: bold; color: #333; margin: 10px 0; }
        .footer { font-size: 11px; color: #777; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>IQRA PUBLIC SCHOOL</h2>
    <div id="clock">00:00:00</div>
    
    <select id="classList" onchange="loadStudents()">
        <option value="">-- SELECT CLASS --</option>
        <option value="1">Class 1</option><option value="2">Class 2</option>
        <option value="3">Class 3</option><option value="4">Class 4</option>
        <option value="5">Class 5</option><option value="6">Class 6</option>
        <option value="7">Class 7</option><option value="8">Class 8</option>
        <option value="9">Class 9</option><option value="10">Class 10</option>
    </select>

    <select id="sList"><option value="">-- SELECT STUDENT --</option></select>

    <div class="cam-box" onclick="startCam()"> <video id="v" autoplay playsinline muted></video>
        <img id="p" style="display:none;">
        <div id="camMsg" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-size:12px; pointer-events:none;">Tap to start Camera</div>
    </div>
    
    <div id="ctrls">
        <button class="b-snap" id="snBtn" onclick="snap()">📸 TAKE PHOTO</button>
        <button class="b-in" onclick="send('check-in')">SCHOOL-IN</button>
        <button class="b-out" onclick="send('check-out')">SCHOOL-OUT</button>
    </div>
    <div id="status">Ready</div>

    <div class="footer">
        Location and camera permissions are required.<br>
        <b>Created by Riyaz Ahmad, PGT Zoology</b>
    </div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlh_xrG3O3Bi7WjpQqWR300Kz_CY8WJ2LE9sT6jDvtvFrvpYWd8o0GQNNWvslqExv-/exec"; 

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

    let v = document.getElementById('v'), b64 = "";
    
    // Sketchware Fix: Manual start trigger
    async function startCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
            v.srcObject = stream;
            v.onloadedmetadata = () => {
                v.play();
                document.getElementById('camMsg').style.display = "none";
            };
        } catch (e) {
            alert("Camera Access Denied! Please check app permissions.");
        }
    }

    // Try starting automatically
    window.onload = () => {
        startCam();
        const sc = localStorage.getItem('lc');
        if(sc) { document.getElementById('classList').value = sc; loadStudents(); }
    };

    function loadStudents() {
        let cid = document.getElementById('classList').value;
        if(!cid) return;
        localStorage.setItem('lc', cid);
        let sl = document.getElementById('sList');
        sl.innerHTML = "<option>Loading...</option>";
        fetch(SCRIPT_URL + "?classId=" + cid).then(r => r.json()).then(d => {
            sl.innerHTML = "<option value=''>-- SELECT STUDENT --</option>";
            d.forEach(n => sl.innerHTML += `<option value="${n}">${n}</option>`);
        });
    }

    function snap() {
        if(!v.srcObject) return alert("Pehle camera start hone dein!");
        const cn = document.getElementById('c');
        cn.width = 300; cn.height = 225;
        cn.getContext('2d').drawImage(v, 0, 0, 300, 225);
        b64 = cn.toDataURL('image/jpeg', 0.4); 
        document.getElementById('p').src = b64; 
        document.getElementById('p').style.display = "block"; v.style.display = "none";
        document.getElementById('snBtn').innerText = "🔄 RETAKE";
    }

    function send(t) {
        const cid = document.getElementById('classList').value;
        const name = document.getElementById('sList').value;
        if(!name) return alert("Student select karein!");
        if(t === 'check-in' && !b64) return alert("Photo lein!");

        document.getElementById('ctrls').style.display = "none";
        document.getElementById('status').innerText = "🚀 Sending...";

        navigator.geolocation.getCurrentPosition(pos => {
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({classId: cid, name: name, type: t, location: pos.coords.latitude+","+pos.coords.longitude, photo: b64})
            });
            
            setTimeout(() => {
                alert("Attendance Recorded!");
                resetUI();
            }, 1000);
        }, () => { alert("GPS ON karein!"); resetUI(); });
    }

    function resetUI() {
        b64 = ""; document.getElementById('p').style.display = "none"; v.style.display = "block";
        document.getElementById('ctrls').style.display = "block";
        document.getElementById('status').innerText = "Ready";
        document.getElementById('snBtn').innerText = "📸 TAKE PHOTO";
        document.getElementById('sList').value = "";
    }
</script>
</body>
</html>
