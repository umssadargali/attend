<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqra Multi-Class Attendance</title>
    <style>
        body { font-family: sans-serif; background: #f0fdf4; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 360px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #2e7d32; }
        h2 { color: #2e7d32; margin: 5px 0; font-size: 20px; }
        #clock { font-size: 36px; font-weight: bold; color: #ff5722; margin: 5px 0; }
        select { width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 16px; font-weight: bold; border: 1px solid #2e7d32; }
        .cam-box { width: 100%; border-radius: 10px; overflow: hidden; border: 2px solid #ccc; aspect-ratio: 4/3; margin-bottom: 10px; background: #000; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; margin-bottom: 8px; cursor: pointer; }
        .b-snap { background: #673ab7; } .b-in { background: #4CAF50; } .b-out { background: #f44336; }
        #status { font-weight: bold; color: #333; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>IQRA PUBLIC SCHOOL</h2>
    <div id="clock">00:00:00</div>
    
    <select id="classList" onchange="loadStudents()">
        <option value="">-- SELECT CLASS --</option>
    </select>

    <select id="sList"><option value="">-- FIRST SELECT CLASS --</option></select>

    <div class="cam-box"><video id="v" autoplay playsinline></video><img id="p" style="display:none;"></div>
    
    <div id="ctrls">
        <button class="b-snap" id="snBtn" onclick="snap()">📸 TAKE PHOTO</button>
        <button class="b-in" onclick="send('check-in')">SCHOOL-IN</button>
        <button class="b-out" onclick="send('check-out')">SCHOOL-OUT</button>
    </div>
    <div id="status">Ready</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "YAHAN_APNA_URL_DALEIN"; 

    // Update Clock
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

    // 1. Load Classes on startup
    fetch(SCRIPT_URL + "?getClasses=true").then(r => r.json()).then(classes => {
        let cl = document.getElementById('classList');
        classes.sort((a,b)=>a-b).forEach(c => cl.innerHTML += `<option value="${c}">Class ${c}</option>`);
    });

    // 2. Load Students when Class is selected
    function loadStudents() {
        let classId = document.getElementById('classList').value;
        let sList = document.getElementById('sList');
        if(!classId) return;
        sList.innerHTML = "<option>Loading Students...</option>";
        fetch(SCRIPT_URL + "?classId=" + classId).then(r => r.json()).then(students => {
            sList.innerHTML = "";
            students.forEach(s => sList.innerHTML += `<option value="${s}">${s}</option>`);
        });
    }

    // Camera Logic
    let v = document.getElementById('v'), b64 = "";
    navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(s => v.srcObject=s);

    function snap() {
        const cn = document.getElementById('c');
        cn.width = 250; cn.height = 180;
        cn.getContext('2d').drawImage(v, 0, 0, 250, 180);
        b64 = cn.toDataURL('image/jpeg', 0.2); 
        document.getElementById('p').src = b64; document.getElementById('p').style.display = "block"; v.style.display = "none";
        document.getElementById('snBtn').innerText = "🔄 RETAKE";
    }

    function send(t) {
        const classId = document.getElementById('classList').value;
        const name = document.getElementById('sList').value;
        if(!classId || !name) return alert("Class aur Student select karein!");
        if(t === 'check-in' && !b64) return alert("Photo Capture karein!");

        document.getElementById('ctrls').style.display = "none";
        document.getElementById('status').innerText = "🚀 Processing...";

        navigator.geolocation.getCurrentPosition(pos => {
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({classId: classId, name: name, type: t, location: pos.coords.latitude+","+pos.coords.longitude, photo: b64})
            });
            setTimeout(() => { alert("Done!"); location.reload(); }, 1200);
        }, () => { alert("GPS On karein!"); location.reload(); });
    }
</script>
</body>
</html>
