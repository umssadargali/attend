<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
/* Aapka Purana Styling Bilkul Waisa Hi Hai */
body { font-family: 'Roboto', sans-serif; background: linear-gradient(to right, #ffffff, #e8f5e9); margin: 0; padding-top: 50px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
h3 { color: #4CAF50; font-size: 28px; margin: 20px 0; }
#clock { font-size: 60px; font-weight: bold; font-family: 'Courier New', monospace; color: #ff5722; background: linear-gradient(to right, #ff5722, #ff9800, #ff5722); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
#date { font-size: 20px; color: #555; margin-bottom: 20px; }
select, button { font-size: 16px; padding: 12px; width: 280px; margin-bottom: 15px; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
button { background-color: #4CAF50; color: white; cursor: pointer; font-weight: bold; }
#photo { display: none; width: 300px; border-radius: 8px; margin-top: 10px; border: 2px solid #4CAF50; }
.footer { margin-top: 20px; font-size: 12px; color: #777; text-align: center; }
</style>
</head>
<body>
<h3>Iqra Public School</h3>
<div style="font-weight:bold; margin-bottom:10px;">Students Attendance System</div>

<div id="clock">00:00:00</div>
<div id="date">Loading...</div>

<label>Select Student:</label>
<select id="teacherSelect"><option>Loading...</option></select>

<div id="camera">
    <video id="video" autoplay playsinline width="300" height="225" style="border-radius: 8px; background:#000;"></video>
    <br>
    <button onclick="capturePhoto()" style="background:#673ab7;">Capture Photo</button>
    <canvas id="canvas" style="display: none;"></canvas>
    <img id="photo">
</div>

<button onclick="submitAttendance('check-in')">School-In</button>
<button onclick="submitAttendance('check-out')" style="background:#ff5722;">School-Out</button>

<div id="status" style="color:blue; font-weight:bold;"></div>
<div class="footer">Created and Designed by Riyaz Ahmad PGT Zoology</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsFahB1EHS9syrOngV2nuDAPJ-d3P8dluTptapVwyWdNWZBevcyYbP7hBDBvAHgdON/exec"; // <--- APNA URL YAHAN DALEIN

function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString();
    document.getElementById('date').textContent = now.toDateString();
}
setInterval(updateClock, 1000);
updateClock();

// Fetch Student List from Google Sheet
fetch(SCRIPT_URL + "?getNames=true")
    .then(r => r.json())
    .then(list => {
        const select = document.getElementById('teacherSelect');
        select.innerHTML = "";
        list.forEach(n => { let o = document.createElement('option'); o.value = n; o.textContent = n; select.appendChild(o); });
    });

// Direct Camera Access
const video = document.getElementById('video');
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(stream => video.srcObject = stream)
    .catch(err => alert("Camera Error: " + err));

let capturedPhoto = "";
function capturePhoto() {
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedPhoto = canvas.toDataURL('image/jpeg', 0.5);
    document.getElementById('photo').src = capturedPhoto;
    document.getElementById('photo').style.display = "block";
    video.style.display = "none";
}

function submitAttendance(type) {
    const name = document.getElementById('teacherSelect').value;
    if(!capturedPhoto && type === 'check-in') return alert("Pehle photo kheenchiye!");
    
    document.getElementById('status').innerText = "Saving... Please wait.";
    
    navigator.geolocation.getCurrentPosition(pos => {
        const loc = pos.coords.latitude + "," + pos.coords.longitude;
        const payload = { name: name, type: type, location: loc, photo: capturedPhoto };
        
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(() => { alert("Attendance Success!"); location.reload(); })
        .catch(e => alert("Error: " + e));
    });
}
</script>
</body>
</html>
