<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqra Public School Attendance</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 360px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #2e7d32; }
        h2 { color: #2e7d32; margin: 5px 0 2px 0; font-size: 22px; text-transform: uppercase; }
        .sub { color: #444; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        #clock { font-size: 42px; font-weight: bold; color: #ff5722; font-family: monospace; margin: 5px 0; }
        #date { font-size: 15px; color: #666; margin-bottom: 15px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 16px; font-weight: 600; }
        .cam-box { width: 100%; border-radius: 10px; overflow: hidden; border: 3px solid #4CAF50; background: #000; aspect-ratio: 4/3; margin-bottom: 10px; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 8px; }
        .b-snap { background: #673ab7; } .b-in { background: #4CAF50; } .b-out { background: #f44336; }
        #status { font-size: 14px; font-weight: bold; margin: 10px 0; color: #333; }
        .footer { font-size: 12px; color: #777; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>IQRA PUBLIC SCHOOL</h2>
    <div class="sub">Students Attendance System</div>
    <div id="clock">00:00:00</div>
    <div id="date">Loading...</div>

    <select id="sList"><option>Connecting...</option></select>

    <div class="cam-box">
        <video id="v" autoplay playsinline></video>
        <img id="p" style="display:none;">
    </div>

    <button class="b-snap" id="snBtn" onclick="snap()">📸 CAPTURE PHOTO</button>
    <button class="b-in" id="iB" onclick="send('check-in')">SCHOOL-IN</button>
    <button class="b-out" id="oB" onclick="send('check-out')">SCHOOL-OUT</button>

    <div id="status">Ready</div>
    <div class="footer">
        Location and camera permissions are required.<br>
        <b>Created by Riyaz Ahmad, PGT Zoology</b>
    </div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7_gDby9hIutrnZ3p8iiTYqLvNZVvbX77N_-G78yANy3DzQ45SHlqcLtSrI1mjNbM/exec"; 

    function tick() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('date').innerText = n.toDateString();
    }
    setInterval(tick, 1000); tick();

    fetch(SCRIPT_URL + "?getNames=true").then(r => r.json()).then(d => {
        let s = document.getElementById('sList'); s.innerHTML = "";
        d.forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`);
    });

    let v = document.getElementById('v'), b64 = "";
    navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(s => v.srcObject=s);

    function snap() {
        const cn = document.getElementById('c');
        cn.width = 250; cn.height = 180;
        cn.getContext('2d').drawImage(v, 0, 0, 250, 180);
        b64 = cn.toDataURL('image/jpeg', 0.3);
        document.getElementById('p').src = b64;
        document.getElementById('p').style.display = "block";
        v.style.display = "none";
        document.getElementById('snBtn').innerText = "🔄 RETAKE PHOTO";
    }

    function send(t) {
        const n = document.getElementById('sList').value, st = document.getElementById('status');
        if(t === 'check-in' && !b64) return alert("Pehle photo capture karein!");
        
        st.innerText = "🚀 Sending...";
        document.getElementById('iB').disabled = true;
        document.getElementById('oB').disabled = true;

        navigator.geolocation.getCurrentPosition(pos => {
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({name: n, type: t, location: pos.coords.latitude+","+pos.coords.longitude, photo: b64})
            });
            st.innerHTML = "✅ Done!";
            setTimeout(() => {
                b64 = ""; document.getElementById('p').style.display = "none"; v.style.display = "block";
                document.getElementById('iB').disabled = false; document.getElementById('oB').disabled = false;
                st.innerText = "Ready"; document.getElementById('snBtn').innerText = "📸 CAPTURE PHOTO";
            }, 2000);
        }, () => alert("GPS ON karein!"), {timeout: 2000});
    }
</script>
</body>
</html>
